global:
  scrape_interval: 5s
  scrape_timeout: 3s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Мониторинг самого Prometheus
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Проверка HTTP-доступности Flask-приложения через Blackbox
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://10.0.0.100:8000       # Flask приложение
          - https://student.psu.ru       # пример внешней цели
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Сбор метрик счётчика посещений напрямую из Flask
  - job_name: view_total
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['10.0.0.100:8000']
        labels:
          service: 'Flask-Redis-App'
